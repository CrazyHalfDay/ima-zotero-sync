name: Release

# 手动触发：在仓库 Actions → Release → Run workflow 点一下，
# 按 manifest.json 当前版本号打包并发布到 Release。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: meta
        run: |
          VERSION=$(python3 -c "import json;print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "manifest version = $VERSION"

      - name: Build XPI
        run: |
          chmod +x scripts/build-xpi.sh
          ./scripts/build-xpi.sh build/ima-zotero-sync.xpi

      - name: Generate update.json
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          XPI_NAME: ima-zotero-sync.xpi
        run: python3 scripts/gen-update-json.py build/update.json

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: |
            build/ima-zotero-sync.xpi
            build/update.json
          fail_on_unmatched_files: true
          generate_release_notes: true
